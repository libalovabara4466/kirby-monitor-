name: Monitor TPC Supporter Count

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Fetch page and check count
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHANGE_THRESHOLD: "1"
        run: |
          python3 << 'PYEOF'
          import re, os, json
          from datetime import datetime, timezone
          import urllib.request
          from playwright.sync_api import sync_playwright

          print("Launching browser...")
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto("https://theprivacycollective.nl/applovin-home/", timeout=60000)

              try:
                  page.wait_for_selector("text=STEUNBETUIGINGEN", timeout=30000)
                  print("Counter element found!")
              except:
                  print("Timeout waiting for counter, trying anyway...")

              page.wait_for_timeout(3000)
              html = page.content()
              browser.close()

          print(f"Page loaded, {len(html)} chars")

          match = re.search(r"([\d.]+)\s*STEUNBETUIGINGEN", html, re.IGNORECASE)
          if not match:
              match = re.search(r">([\d.]{3,})<.*?STEUNBETUIGINGEN", html, re.IGNORECASE | re.DOTALL)
          if not match:
              for i, line in enumerate(html.split('\n')):
                  if 'steun' in line.lower():
                      print(f"Line {i}: {line.strip()[:200]}")
              exit(1)

          raw = match.group(1)
          current = int(raw.replace(".", ""))
          print(f"Found count: {current:,}")

          data = {"count": None, "history": []}
          if os.path.exists("data.json"):
              with open("data.json") as f:
                  data = json.load(f)

          previous = data.get("count")
          threshold = int(os.environ.get("CHANGE_THRESHOLD", "1"))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          print(f"[{now}] Current: {current:,} | Previous: {previous}")

          data.setdefault("history", [])
          data["history"].append({"time": now, "count": current})
          data["history"] = data["history"][-500:]

          def send_teams(message):
              url = os.environ.get("TEAMS_WEBHOOK")
              if not url:
                  print("No TEAMS_WEBHOOK set, skipping")
                  return
              payload = json.dumps({
                  "type": "message",
                  "attachments": [{
                      "contentType": "application/vnd.microsoft.card.adaptive",
                      "content": {
                          "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                          "type": "AdaptiveCard",
                          "version": "1.4",
                          "body": [{
                              "type": "TextBlock",
                              "text": message,
                              "wrap": True,
                              "size": "Medium"
                          }]
                      }
                  }]
              }).encode("utf-8")
              req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
              urllib.request.urlopen(req, timeout=15)
              print("Teams notification sent!")

          def send_discord(message):
              url = os.environ.get("DISCORD_WEBHOOK")
              if not url:
                  return
              payload = json.dumps({"content": message}).encode("utf-8")
              req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
              urllib.request.urlopen(req, timeout=15)
              print("Discord sent")

          def send_telegram(message):
              token = os.environ.get("TELEGRAM_TOKEN")
              chat_id = os.environ.get("TELEGRAM_CHAT_ID")
              if not token or not chat_id:
                  return
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              payload = json.dumps({"chat_id": chat_id, "text": message}).encode("utf-8")
              req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
              urllib.request.urlopen(req, timeout=15)
              print("Telegram sent")

          if previous is not None:
              diff = current - previous
              if abs(diff) >= threshold:
                  direction = "📈 UP" if diff > 0 else "📉 DOWN"
                  msg = f"{direction} by {abs(diff):,}!  \\nTPC AppLovin steunbetuigingen: {previous:,} → {current:,}  \\nTime: {now}  \\nhttps://theprivacycollective.nl/applovin-home/"
                  print(msg)
                  send_teams(msg)
                  send_discord(msg)
                  send_telegram(msg)
              else:
                  print(f"Change of {diff:,} below threshold ({threshold})")
          else:
              print(f"First run. Baseline: {current:,}")

          data["count"] = current
          with open("data.json", "w") as f:
              json.dump(data, f, indent=2)
          PYEOF

      - name: Commit updated data
        run: |
          git config user.name "TPC Monitor Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update count $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
