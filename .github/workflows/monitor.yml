name: Monitor TPC Supporter Count

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tpc-monitor
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Monitor loop
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          for i in $(seq 1 70); do
            echo "=== Check #$i at $(date -u) ==="

            python3 << 'PYEOF'
          import re, os, json, subprocess
          from datetime import datetime, timezone
          from playwright.sync_api import sync_playwright

          print("Launching browser...")
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto("https://theprivacycollective.nl/applovin-home/", timeout=60000)

              try:
                  page.wait_for_selector("text=STEUNBETUIGINGEN", timeout=30000)
                  print("Counter element found!")
              except:
                  print("Timeout waiting for counter, trying anyway...")

              page.wait_for_timeout(3000)
              html = page.content()
              browser.close()

          print(f"Page loaded, {len(html)} chars")

          match = re.search(r"([\d.]+)\s*STEUNBETUIGINGEN", html, re.IGNORECASE)
          if not match:
              match = re.search(r">([\d.]{3,})<.*?STEUNBETUIGINGEN", html, re.IGNORECASE | re.DOTALL)
          if not match:
              print("ERROR: Could not find counter")
          else:
              raw = match.group(1)
              current = int(raw.replace(".", ""))
              print(f"Found count: {current:,}")

              data = {"count": None, "history": []}
              if os.path.exists("data.json"):
                  try:
                      with open("data.json") as f:
                          data = json.load(f)
                  except (json.JSONDecodeError, ValueError) as e:
                      print(f"WARNING: data.json was corrupted ({e}), resetting")
                      data = {"count": None, "history": []}

              previous = data.get("count")
              now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
              print(f"[{now}] Current: {current:,} | Previous: {previous}")

              data.setdefault("history", [])
              data["history"].append({"time": now, "count": current})
              data["history"] = data["history"][-500:]

              if previous is not None and current != previous:
                  diff = current - previous
                  direction = "📈 UP" if diff > 0 else "📉 DOWN"
                  msg = f"{direction} {abs(diff):,} | Steunbetuigingen: {current:,} (was {previous:,}) | {now}"
              else:
                  msg = f"Steunbetuigingen: {current:,} | No change | {now}"

              print(msg)

              webhook = os.environ.get("DISCORD_WEBHOOK", "")
              if webhook:
                  payload = json.dumps({"content": msg})
                  result = subprocess.run(
                      ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}",
                       "-H", "Content-Type: application/json",
                       "-d", payload,
                       webhook],
                      capture_output=True, text=True, timeout=15
                  )
                  status = result.stdout.strip()
                  if status in ("200", "204"):
                      print(f"Discord sent! (HTTP {status})")
                  else:
                      print(f"Discord failed (HTTP {status})")

              data["count"] = current
              with open("data.json", "w") as f:
                  json.dump(data, f, indent=2)
              print("Data saved.")
          PYEOF

            # Commit after each check
            git config user.name "TPC Monitor Bot"
            git config user.email "bot@users.noreply.github.com"
            git pull --rebase || git rebase --abort 2>/dev/null || true
            git add data.json
            git diff --cached --quiet || git commit -m "Update count $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push || true

            # Wait 5 minutes before next check (skip wait on last iteration)
            if [ $i -lt 70 ]; then
              echo "Sleeping 5 minutes..."
              sleep 300
            fi
          done
          echo "Loop complete."

